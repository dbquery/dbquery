name: Bug Report
description: Report a bug or unexpected behavior in DBQuery
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and the steps to reproduce it. Include what you expected vs what actually happened.
      placeholder: |
        1. I opened DBQuery and connected to...
        2. I clicked on...
        3. Expected: ...
        4. Instead: ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "App version, OS, and database type."
      placeholder: "e.g. v1.2.0 / macOS / PostgreSQL"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or paste relevant error logs.
      placeholder: Drag and drop images here, or paste error messages...
    validations:
      required: false
